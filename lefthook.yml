# Git hooks managed by lefthook. Installed by the root `prepare` script on
# `bun install`; run `bunx lefthook install` to (re)install manually.
#
# The committed README.md, packages/docs/llms.txt, and llms-full.txt are the
# repo's tracked generated documentation artifacts. README.md is generated from
# packages/docs/guide/README.md; the llms files are generated from the guide
# markdown, the docs package manifest, and the types API surface
# (packages/docs-site/scripts/build-llms.ts). Byte-for-byte drift guards in
# `bun test` fail CI when committed copies go stale. This hook regenerates and
# re-stages them whenever a commit touches one of those inputs, so the guards
# never trip locally. CI's drift guards stay the real backstop if the globs ever
# under-trigger.
pre-commit:
  commands:
    # No glob: runs on every commit. Fails any commit that does not stage a
    # change to packages/docs/guide/changelog.md, keeping the changelog from
    # drifting behind the work that lands. Bypass a genuine exception with
    # `git commit --no-verify`.
    changelog:
      run: bun scripts/changelog-gate.ts
    readme:
      glob:
        - "README.md"
        - "packages/docs/guide/README.md"
        - "scripts/sync-readme.ts"
      run: |
        bun run readme:sync
        git add README.md
    llms-txt:
      glob:
        - "packages/docs/guide/*.md"
        - "packages/docs/package.json"
        - "packages/types/*"
      run: |
        bun packages/docs-site/scripts/build-llms.ts
        git add packages/docs/llms.txt packages/docs/llms-full.txt
