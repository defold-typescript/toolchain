[tools]
bun = "1.3"

[tasks.sync-api-docs-check]
description = "Check vendored Defold API fixtures for drift against the pinned ref-doc.zip"
dir = "{{config_root}}/packages/types"
run = "bun run sync-api-docs --check"

[tasks.import-defold-release]
description = "Check Defold 1.13.0 release docs and emit deterministic import evidence"
dir = "{{config_root}}/packages/types"
run = "bun run import-defold-release -- 1.13.0 --check"

[tasks.release-readiness]
description = "Offline Defold release-promotion gate over committed evidence (deterministic, fails closed). Add --live for the advisory network archive refresh."
run = "bun scripts/defold-release-readiness.ts --check"

[tasks.current-version]
description = "Show the currently-published npm version of each workspace package"
run = "bun scripts/current-version.ts"

[tasks.smoke]
description = "Advisory packed-install release smoke (network-touching, not a CI gate)"
run = "bun scripts/release-smoke.ts"

[tasks.registry-smoke]
description = "Advisory registry-install smoke — pulls the published @defold-typescript/cli from npm (network-touching, not a CI gate)"
run = "bun scripts/registry-smoke.ts"

[tasks.pack-proof]
description = "Advisory live stamped-pack proof — packs the three tarballs in throwaway worktrees at a synthetic version with a no-regen control (slow, not a CI gate)"
run = "bun scripts/release-pack-proof.ts"

[tasks.ref-doc-delta]
description = "Advisory live ref-doc delta verifier — network-touching, not a CI gate"
run = "bun run ref-doc-delta"

[tasks.trust-publishers]
description = "One-time npm OIDC trusted-publisher setup for all workspace packages (needs npm >= 11.10.0 + npm login). Usage: mise run trust-publishers [--list]"
run = "bun scripts/trust-publishers.ts"

[tasks.release]
description = "Cut a release: bump from the live npm version and push the v<version> tag (CI publishes via OIDC). Usage: mise run release [<version>|patch|minor|major] (default: patch)"
run = "bun scripts/release.ts"

[tasks."example:build"]
description = "Compile the platformer example (docs/examples/platformer) once with the local working-tree CLI"
run = "bun packages/cli/src/bin.ts build docs/examples/platformer"

[tasks."example:update"]
description = "Re-sync the platformer example to the working-tree CLI (init --force + build) — manual pre-publish refresh"
run = "bun scripts/example-update.ts"

[tasks."example:smoke"]
description = "Convert + verify the platformer example (init --force + build + tsc --noEmit) — advisory pre-publish smoke, not a CI gate"
run = "bun scripts/example-smoke.ts"

[tasks."example:watch"]
description = "Watch and recompile the platformer example with the local working-tree CLI"
run = "bun packages/cli/src/bin.ts watch docs/examples/platformer"

[tasks."example:setup-debug"]
description = "Executes setup-debug cli command for the platformer example"
run = "bun packages/cli/src/bin.ts setup-debug docs/examples/platformer"

[tasks."dev:site-docs"]
description = "Live dev server (hot reload)"
run = "bun run --filter @defold-typescript/docs-site dev"

[tasks."dev:slides"]
description = "Build the tutorial slide deck (docs/tutorial) and open it in the browser"
run = "bun scripts/dev-slides.ts"

[tasks."dev:build-llms"]
description = "Build llms.txt and llms-full.txt"
run = "bun --filter @defold-typescript/docs-site build-llms"
