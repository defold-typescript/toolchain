name: CI

on:
  # Branch pushes and PRs only — NOT tag pushes. A v* tag is handled by
  # release.yml (which runs its own gate before publishing) and always points
  # at an already-CI-green main commit, so running CI here would just burn a
  # full matrix re-running the same commit.
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run typecheck
      - run: bun run lint

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # Build first: publish-pack / release-bin-smoke tests build the cli, which
      # resolves @defold-typescript/transpiler through its built dist/. A clean
      # checkout has no dist, so test-without-build cannot resolve it.
      - run: bun run build
      - run: bun test
