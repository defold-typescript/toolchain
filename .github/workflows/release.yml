# Release workflow.
#
# Tag-driven (`v*`) publish to npm via OIDC trusted publishing — no tokens.
# Publishing uses `npm` because `bun publish` has no OIDC path
# (oven-sh/bun#15601); npm (Node 24 ships a new enough version) does the OIDC
# token exchange automatically given `id-token: write`.
#
# CI is the sole publish path (the local bun-publish script was retired).
# Re-running the workflow on an existing tag is safe: the real publish step is
# idempotent — it skips any package whose target version is already on npm.
#
# Ordering: require CI green (read the Checks API for this exact commit; abort
# if CI is absent, still running, or red) -> install (frozen) -> build -> jq
# stamp (version + workspace dep rewrite) -> dry-run -> publish. The publish
# never re-runs typecheck/lint/test: it trusts the CI run that already validated
# this commit on the full OS matrix and refuses to publish if that run is not
# green, so the checks are done exactly once.
#   - Build is load-bearing: cli/tstl-plugin resolve
#     @defold-typescript/transpiler through its built dist/ (its `types`
#     export). Mirrors ci.yml.
#   - The jq stamp rewrites every internal `workspace:*` dep to the concrete
#     version; npm publish does not resolve the workspace protocol the way bun
#     does. (The repo manifests stay pinned at 0.0.0; the tag drives the
#     published version.)
#
# The real publish is fenced behind the ENABLE_NPM_PUBLISH repo variable for a
# safe cutover (the dry-run always runs). One-time npm setup: configure a
# Trusted Publisher for each of
# @defold-typescript/{types,transpiler,tstl-plugin,docs,library-types,cli} ->
# repo defold-typescript/toolchain, workflow release.yml. A brand-new package
# (library-types) has no npm entry to attach a Trusted Publisher to yet, so its
# first release needs a one-time manual `npm publish` (granular token) to create
# it; OIDC takes over from the next release.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to publish (without leading v)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      checks: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      # npm performs the OIDC publish (bun cannot). Node 24 ships npm new enough
      # for trusted publishing; registry-url + no token is the OIDC setup.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$REF_NAME"
          fi
          VERSION="${VERSION#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver: $VERSION" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      # Refuse to publish unless ci.yml already finished green on THIS commit.
      # The release never re-runs the checks; it reads CI's result from the
      # Checks API (keyed by SHA) and aborts if CI is absent, still running, or
      # red. ci.yml runs lint-typecheck + a 3-OS `test` matrix, so the names are
      # `lint-typecheck` and `test (<os>)`.
      - name: Require CI green on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha="${{ github.sha }}"
          runs=$(gh api "repos/${{ github.repository }}/commits/$sha/check-runs?per_page=100" \
                   --jq '[.check_runs[] | select(.name | test("^lint-typecheck$|^test "))]')
          total=$(jq 'length' <<<"$runs")
          completed=$(jq '[.[] | select(.status=="completed")] | length' <<<"$runs")
          green=$(jq '[.[] | select(.status=="completed" and .conclusion=="success")] | length' <<<"$runs")
          if [ "$total" -eq 0 ]; then
            echo "::error::No CI check runs on $sha. Tag a commit whose CI has run; refusing to publish."
            exit 1
          fi
          if [ "$completed" -ne "$total" ]; then
            echo "::error::CI still running on $sha ($completed/$total complete). Re-run this release once CI finishes."
            exit 1
          fi
          if [ "$green" -ne "$total" ]; then
            echo "::error::CI is not green on $sha ($green/$total passed); refusing to publish:"
            jq -r '.[] | select(.conclusion!="success") | "  - \(.name): \(.conclusion)"' <<<"$runs"
            exit 1
          fi
          echo "CI green on $sha ($green/$total). Proceeding to publish."

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build first: cli/tstl-plugin resolve @defold-typescript/transpiler
      # through its built dist/ (its `types` export), so a clean checkout cannot
      # typecheck until the workspace is built. Mirrors ci.yml.
      - name: Build
        run: bun run build

      - name: Stamp version and rewrite workspace deps
        shell: bash
        run: |
          # Set .version and rewrite every internal workspace:* dependency to the
          # concrete version. `npm publish` does not understand the workspace
          # protocol, so the rewrite must happen in the manifest before packing.
          JQ='.version = $v
            | to_entries
            | map(
                if (.key | IN("dependencies","devDependencies","peerDependencies","optionalDependencies"))
                   and (.value | type == "object")
                then .value |= with_entries(
                       if (.value | type) == "string" and (.value | startswith("workspace:"))
                       then .value = $v else . end)
                else . end)
            | from_entries'
          for manifest in package.json packages/*/package.json; do
            jq --arg v "$VERSION" "$JQ" "$manifest" > "$manifest.tmp"
            mv "$manifest.tmp" "$manifest"
          done

      # Dependency order: deps before dependents (types before library-types;
      # library-types and docs before cli). Dry-run needs no auth and runs on
      # every tag.
      - name: Publish (dry-run)
        run: |
          for pkg in types transpiler tstl-plugin docs library-types cli; do
            ( cd "packages/$pkg" && npm publish --dry-run --access public )
          done

      - name: Publish to npm (OIDC, idempotent)
        if: ${{ vars.ENABLE_NPM_PUBLISH == 'true' }}
        run: |
          # Idempotent: skip any package whose target version is already on npm,
          # so re-running the workflow on an existing tag is safe.
          for pkg in types transpiler tstl-plugin docs library-types cli; do
            name="@defold-typescript/$pkg"
            if npm view "$name@$VERSION" version >/dev/null 2>&1; then
              echo "$name@$VERSION already on npm — skipping"
            else
              ( cd "packages/$pkg" && npm publish --access public )
            fi
          done
